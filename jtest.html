<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JS Test</title>
<style>
  body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 20px; }
  .test-btn { background: #f5c518; color: #000; border: none; padding: 16px 24px; font-size: 16px; border-radius: 8px; margin: 8px 0; display: block; width: 100%; }
  .test-btn.tapped { background: #3ecf8e; }
  #log { background: #1a1a1a; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 12px; margin-top: 16px; min-height: 100px; }
  .ok { color: #3ecf8e; }
  .err { color: #ef4444; }
</style>
</head>
<body>
<h1>HonesTech JS Diagnostic</h1>
<p>If JavaScript works on your phone, the items below will appear and the button will turn green when tapped.</p>

<button class="test-btn" id="testBtn">Tap me — should turn green</button>

<div id="generated"></div>

<div id="log">Loading...</div>

<script>
  var log = document.getElementById('log');
  log.innerHTML = '<span class="ok">✓ JavaScript is running</span>';

  // Test 1: dynamic content generation (like buildItems does)
  var container = document.getElementById('generated');
  var items = ['Item one', 'Item two', 'Item three'];
  items.forEach(function(item, i) {
    var div = document.createElement('div');
    div.style.background = '#1a1a1a';
    div.style.padding = '10px';
    div.style.margin = '6px 0';
    div.style.borderRadius = '4px';
    div.textContent = (i+1) + '. ' + item;
    container.appendChild(div);
  });
  log.innerHTML += '<br><span class="ok">✓ Dynamic items generated</span>';

  // Test 2: button click handler
  document.getElementById('testBtn').addEventListener('click', function() {
    this.classList.add('tapped');
    this.textContent = '✓ Button works!';
    log.innerHTML += '<br><span class="ok">✓ Button click registered at ' + new Date().toLocaleTimeString() + '</span>';
  });
  log.innerHTML += '<br><span class="ok">✓ Click listener attached</span>';

  // Test 3: report environment
  log.innerHTML += '<br><br>User Agent:<br>' + navigator.userAgent;
</script>

</body>
</html>
